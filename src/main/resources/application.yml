spring:
  application:
    name: DevBoard-Product

  # 1. Database Connection
  datasource:
    url: jdbc:postgresql://localhost:5432/devboard_db
    username: mukund
    password: Root@123
    driver-class-name: org.postgresql.Driver

  # 2. JPA & Hibernate Configuration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 3. Flyway (Now correctly nested under 'spring')
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # 4. GraphQL (Now correctly nested under 'spring')
  graphql:
    path: /graphql
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      printer:
        enabled: true
      inspection:
        enabled: true