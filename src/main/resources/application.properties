spring.application.name=DevBoard-Product
spring:
# 1. Database Connection (Standard Runtime)
datasource:
url: jdbc:postgresql://localhost:5432/devboard_db
username: postgres
password: your_password
driver-class-name: org.postgresql.Driver

# 2. JPA & Hibernate Configuration
jpa:
hibernate:
# 'validate' is best with Flyway: it ensures entities match the DB
ddl-auto: validate
show-sql: true
properties:
hibernate:
format_sql: true
dialect: org.hibernate.dialect.PostgreSQLDialect

# 3. Flyway Migration Tool
flyway:
enabled: true
# Inherits url/user/password from datasource by default
locations: classpath:db/migration
baseline-on-migrate: true

# 4. Spring for GraphQL Configuration
graphql:
graphiql:
enabled: true
path: /graphiql # Test your API here
schema:
printer:
enabled: true